<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมช่วยสรุป Report Ads และ Ranking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f1f1; }
        .main-container { background: #fff; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .paste-area { border: 2px dashed #ccc; padding: 30px; text-align: center; background: #fafafa; cursor: pointer; transition: 0.3s; border-radius: 8px; }
        .paste-area:hover { background: #f0f7ff; border-color: #0d6efd; }
        #image-preview-container img { max-width: 150px; margin: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; }
        #image-preview-container img:hover { border-color: #ff4d4d; opacity: 0.8; }
        .item-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #0d6efd; }
    </style>
</head>

<body>
    <div class="container mt-4 mb-5">
        <div class="main-container">
            <h2 class="mb-3">📊 สรุป Report Ads & Ranking</h2>
            <hr>
            <form action="report.html" method="get" id="reportForm">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Google Ads - Period (From)</label>
                        <input type="date" class="form-control" name="google_ads_period_from">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Google Ads - Period (To)</label>
                        <input type="date" class="form-control" name="google_ads_period_to">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Google Ads - Budget</label>
                        <input type="text" class="form-control" name="google_ads_budget" placeholder="เช่น 50,000">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Google Ads - Totals Spend</label>
                        <input type="text" class="form-control" name="google_ads_spend" placeholder="เช่น 48,500">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">จำนวนรายการโฆษณา (Item Amount)</label>
                    <input type="number" class="form-control" id="google_ads_item_amount" oninput="initGoogleAdsItem()" placeholder="ใส่จำนวนเพื่อสร้างช่องกรอก">
                </div>
                <div id="google_ads_item_holder"></div>

                <div class="mb-4 p-3 border rounded">
                    <label class="form-label fw-bold">📸 รูปภาพประกอบ (Ctrl + V เพื่อวาง)</label>
                    <div id="paste-zone" class="paste-area">คลิกที่นี่แล้วกด Ctrl + V เพื่อวางรูปภาพ (คลิกที่รูปเพื่อลบ)</div>
                    <div id="image-preview-container" class="d-flex flex-wrap mt-3"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">สร้างรายงาน</button>
            </form>
        </div>
    </div>

    <script>
        // 1. จัดการช่องกรอกรายการ Ads
        function initGoogleAdsItem() {
            const holder = document.getElementById('google_ads_item_holder');
            const amount = parseInt(document.getElementById('google_ads_item_amount').value) || 0;
            holder.innerHTML = "";

            for (let i = 0; i < amount; i++) {
                holder.innerHTML += `
                    <div class="item-box shadow-sm">
                        <h6 class="fw-bold text-primary">Item #${i + 1}</h6>
                        <div class="row">
                            <div class="col-md-6 mb-2"><input type="text" class="form-control form-control-sm" name="google_ads_title_${i}" placeholder="ชื่อแคมเปญ"></div>
                            <div class="col-md-2 mb-2"><input type="number" class="form-control form-control-sm" name="google_ads_impression_${i}" placeholder="Impression"></div>
                            <div class="col-md-2 mb-2"><input type="number" class="form-control form-control-sm" name="google_ads_clicks_${i}" placeholder="Clicks"></div>
                            <div class="col-md-2 mb-2"><input type="text" class="form-control form-control-sm" name="google_ads_cpc_${i}" placeholder="CPC"></div>
                        </div>
                    </div>`;
            }
        }

        // 2. จัดการการวางรูปภาพ (Paste)
        document.addEventListener('paste', function (e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const container = document.getElementById('image-preview-container');
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.className = 'img-thumbnail';
                        img.onclick = () => img.remove(); // คลิกเพื่อลบ
                        container.appendChild(img);
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        // 3. ฟังก์ชันบีบอัดรูปภาพ (ลดขนาดก่อนลง LocalStorage)
        function compressImage(base64, maxWidth = 1000) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ratio = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * ratio;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // บีบเหลือคุณภาพ 70%
                };
            });
        }

        // 4. จัดการตอน Submit (Save ลง LocalStorage)
        document.getElementById('reportForm').onsubmit = async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "กำลังประมวลผลรูปภาพ...";

            try {
                localStorage.removeItem('report_imgs'); // ล้างของเก่า
                const previewImgs = document.querySelectorAll('#image-preview-container img');
                let compressedData = [];

                for (let img of previewImgs) {
                    const miniImg = await compressImage(img.src);
                    compressedData.push(miniImg);
                }

                localStorage.setItem('report_imgs', JSON.stringify(compressedData));
                this.submit(); // ส่งฟอร์มไปหน้า report.html
            } catch (err) {
                alert("เกิดข้อผิดพลาด: พื้นที่เต็มหรือรูปใหญ่เกินไป!");
                btn.disabled = false;
                btn.innerText = "สร้างรายงาน";
            }
        };
    </script>
</body>
</html>
