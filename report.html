<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปรายงาน Ads และ Ranking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .report-card { background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); padding: 40px; margin-top: 30px; }
        .header-title { color: #0d6efd; border-left: 5px solid #0d6efd; padding-left: 15px; margin-bottom: 25px; }
        table { margin-top: 20px; }
        .img-report { max-width: 100%; height: auto; border: 1px solid #eee; }
        
        @media print {
            .no-print { display: none; }
            body { background: #fff; }
            .report-card { box-shadow: none; padding: 0; margin-top: 0; }
        }
    </style>
</head>

<body>
    <div class="container mb-5">
        <div class="report-card" id="printArea">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="header-title">Ads & SEO Performance Report</h2>
                <div class="no-print">
                    <button onclick="window.print()" class="btn btn-success">พิมพ์รายงาน (PDF)</button>
                    <a href="index.html" class="btn btn-outline-secondary">กลับไปหน้าหลัก</a>
                </div>
            </div>

            <h4 class="mb-3 text-secondary border-bottom pb-2">1. สรุปผลการดำเนินงาน (Visual Overview)</h4>
            <div id="val-images-container" class="mb-5 text-center">
                </div>

            <h4 class="mb-3 text-secondary border-bottom pb-2">2. Google Ads Summary</h4>
            <div class="p-3 border rounded mb-4 bg-light shadow-sm">
                <div class="row text-center">
                    <div class="col-md-6 border-end">
                        <small class="text-muted">ระยะเวลา</small>
                        <p class="mb-0 fw-bold"><span id="val-period">-</span></p>
                    </div>
                    <div class="col-md-3 border-end">
                        <small class="text-muted">งบประมาณ</small>
                        <p class="mb-0 fw-bold text-primary"><span id="val-budget">-</span></p>
                    </div>
                    <div class="col-md-3">
                        <small class="text-muted">จ่ายจริง</small>
                        <p class="mb-0 fw-bold text-danger"><span id="val-spend">-</span></p>
                    </div>
                </div>
            </div>

            <h4 class="mb-3 text-secondary border-bottom pb-2">3. Detailed Ads Performance</h4>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle shadow-sm">
                    <thead class="table-primary">
                        <tr>
                            <th>Ad Title</th>
                            <th class="text-center">Impressions</th>
                            <th class="text-center">Clicks</th>
                            <th class="text-center">CTR (%)</th>
                            <th class="text-center">CPC</th>
                        </tr>
                    </thead>
                    <tbody id="val-ads-table">
                        </tbody>
                </table>
            </div>

            <div class="mt-5 text-center text-muted" style="font-size: 12px;">
                รายงานนี้สร้างขึ้นโดยระบบอัตโนมัติเมื่อวันที่: <span id="current-date"></span>
            </div>
        </div>
    </div>

    <script>
        // 1. ดึงค่าจาก URL Parameters
        const params = new URLSearchParams(window.location.search);

        // Ads Summary
        const from = params.get('google_ads_period_from') || '-';
        const to = params.get('google_ads_period_to') || '-';
        document.getElementById('val-period').innerText = `${from} ถึง ${to}`;
        document.getElementById('val-budget').innerText = (params.get('google_ads_budget') || '0') + ' บาท';
        document.getElementById('val-spend').innerText = (params.get('google_ads_spend') || '0') + ' บาท';

        // 2. วนลูปสร้างตาราง Ads
        const tableBody = document.getElementById('val-ads-table');
        let i = 0;
        let hasData = false;

        while (params.has(`google_ads_title_${i}`)) {
            hasData = true;
            const title = params.get(`google_ads_title_${i}`);
            const impression = parseInt(params.get(`google_ads_impression_${i}`)) || 0;
            const clicks = parseInt(params.get(`google_ads_clicks_${i}`)) || 0;
            const cpc = params.get(`google_ads_cpc_${i}`) || '0';
            const ctr = impression > 0 ? ((clicks / impression) * 100).toFixed(2) : 0;

            tableBody.innerHTML += `
                <tr>
                    <td><strong>${title}</strong></td>
                    <td class="text-center">${impression.toLocaleString()}</td>
                    <td class="text-center">${clicks.toLocaleString()}</td>
                    <td class="text-center text-primary">${ctr}%</td>
                    <td class="text-center">${cpc}</td>
                </tr>`;
            i++;
        }

        if (!hasData) {
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">ไม่มีข้อมูลโฆษณา</td></tr>';
        }

        // 3. ดึงรูปภาพจาก LocalStorage
        const savedImages = JSON.parse(localStorage.getItem('report_imgs') || "[]");
        const imgContainer = document.getElementById('val-images-container');

        if (savedImages.length > 0) {
            savedImages.forEach(imgData => {
                const img = document.createElement('img');
                img.src = imgData;
                img.className = 'img-report mb-4 rounded shadow-sm d-block mx-auto';
                imgContainer.appendChild(img);
            });
        } else {
            imgContainer.innerHTML = '<p class="text-muted">ไม่มีรูปภาพประกอบ</p>';
        }

        // วันที่ปัจจุบัน
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('th-TH', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    </script>
</body>

</html>
